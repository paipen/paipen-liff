<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>ตรวจสอบสถานะการสมัคร — PaiPen · ไปเป็น</title>
<!-- แก้ WEBAPP_URL เป็น /exec ของ Apps Script -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FAF3E7;--paper:#FFFCF6;--ink:#4A3A2C;--soft:#7C6B58;--clay:#C2724E;--clay-d:#A65A39;
    --sage:#6E8560;--line:#E7DAC1;--gold:#E0A82E}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);background:var(--cream);
    min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
  .card{background:var(--paper);border:1.5px solid var(--line);border-radius:22px;
    box-shadow:0 14px 30px rgba(90,70,54,.14);max-width:460px;width:100%;padding:26px 24px}
  h1{font-family:'Prompt';font-size:22px;text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:var(--soft);font-size:14px;margin-bottom:18px}
  label{font-weight:600;font-size:14px;display:block;margin-bottom:6px}
  input{width:100%;font-family:inherit;font-size:15px;padding:12px;border:1.5px solid var(--line);
    border-radius:12px;background:#fff;outline:none}
  input:focus{border-color:var(--sage)}
  .hint{font-size:12px;color:var(--soft);margin-top:5px}
  button{width:100%;margin-top:16px;border:none;cursor:pointer;color:#fff;font-family:'Prompt';font-weight:600;
    font-size:17px;padding:14px;border-radius:14px;background:var(--clay);box-shadow:0 7px 0 var(--clay-d)}
  button:active{transform:translateY(3px);box-shadow:0 4px 0 var(--clay-d)}
  button:disabled{opacity:.6}
  #result{margin-top:18px;display:none}
  .badge{display:inline-block;font-family:'Prompt';font-weight:600;font-size:14px;padding:6px 16px;border-radius:999px;margin:6px 0}
  .b-ok{background:#E5ECDC;color:#42603a}.b-wait{background:#FBEFCB;color:#8a6a12}.b-no{background:#F6E0D5;color:#a5402a}
  .line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
  .line span:first-child{color:var(--soft)}
  .notfound{text-align:center;color:#a5402a;padding:14px;font-weight:600}
  .err{color:#a5402a;font-size:13px;text-align:center;margin-top:8px;display:none}
</style>
</head>
<body>
  <div class="card">
    <h1>ตรวจสอบสถานะการสมัคร</h1>
    <p class="sub">PaiPen · ไปเป็น — AI เพื่อครูมืออาชีพ</p>
    <label>รหัสสมัคร / เบอร์โทร / อีเมล</label>
    <input id="q" placeholder="เช่น R01-0007 หรือ 0812345678">
    <div class="hint">กรอกอย่างใดอย่างหนึ่งที่ใช้ตอนสมัคร</div>
    <button id="btn" onclick="check()">ตรวจสอบ</button>
    <div class="err" id="err">เกิดข้อผิดพลาด ลองใหม่อีกครั้ง</div>

    <div id="result">
      <div id="found">
        <div style="text-align:center"><span class="badge" id="badge"></span></div>
        <div class="line"><span>ชื่อ</span><span id="r_name"></span></div>
        <div class="line"><span>รหัสสมัคร</span><span id="r_code"></span></div>
        <div class="line"><span>หลักสูตร</span><span id="r_course"></span></div>
        <div class="line"><span>สถานะการสมัคร</span><span id="r_reg"></span></div>
        <div class="line"><span>การชำระเงิน</span><span id="r_pay"></span></div>
        <div class="line"><span>ที่นั่ง</span><span id="r_seat"></span></div>
      </div>
      <div class="notfound" id="notfound" style="display:none">ไม่พบข้อมูลการสมัคร<br>ลองตรวจรหัส/เบอร์/อีเมลอีกครั้ง</div>
    </div>
  </div>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwZfVMp9uXxvr34jBWQAXAJRxAeS3SJCIoXyaKzcYVx9Zoe27ae7M62w0ITIbv6k6WvOg/exec";
  const btn=document.getElementById('btn');
  function payloadFrom(v){
    v=v.trim();
    if(v.indexOf('@')>-1) return {email:v};
    if(/^[0-9]{9,10}$/.test(v)) return {phone:v};
    return {code:v};
  }
  async function check(){
    const v=document.getElementById('q').value.trim();
    if(!v) return;
    document.getElementById('err').style.display='none';
    document.getElementById('result').style.display='none';
    btn.disabled=true; btn.textContent='กำลังตรวจสอบ...';
    try{
      const res=await fetch(WEBAPP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({apiAction:'getStatus',payload:payloadFrom(v)})});
      const d=await res.json();
      document.getElementById('result').style.display='block';
      if(d.ok && d.found){
        document.getElementById('found').style.display='block';
        document.getElementById('notfound').style.display='none';
        document.getElementById('r_name').textContent=d.name||'-';
        document.getElementById('r_code').textContent=d.code||'-';
        document.getElementById('r_course').textContent=d.course_id||'-';
        document.getElementById('r_reg').textContent=d.registration_status||'-';
        document.getElementById('r_pay').textContent=d.payment_status||'-';
        document.getElementById('r_seat').textContent=d.seat_status||'-';
        const b=document.getElementById('badge'); const s=d.registration_status||'';
        if(s.indexOf('ยืนยัน')>-1||s.indexOf('ออกเกียรติบัตร')>-1){b.className='badge b-ok';}
        else if(s.indexOf('ไม่')>-1||s.indexOf('ยกเลิก')>-1){b.className='badge b-no';}
        else{b.className='badge b-wait';}
        b.textContent=s;
      } else {
        document.getElementById('found').style.display='none';
        document.getElementById('notfound').style.display='block';
      }
    }catch(e){ document.getElementById('err').style.display='block'; }
    finally{ btn.disabled=false; btn.textContent='ตรวจสอบ'; }
  }
  document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
</script>
</body>
</html>
